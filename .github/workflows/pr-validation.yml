name: PR Validation

on:
  pull_request:
    branches: [develop, release-candidate, main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  validate:
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/pr-validation.yml@v1.30.0
    with:
      enforce_source_branches: true
      allowed_source_branches: 'develop|release-candidate|hotfix/*'
      target_branches_for_source_check: 'main'
      pr_title_scopes: |
        assert
        backoff
        certificate
        ci
        circuitbreaker
        config
        constants
        core
        cron
        crypto
        deps
        dlq
        docs
        errgroup
        jwt
        license
        log
        mongo
        net
        opentelemetry
        outbox
        pointers
        postgres
        rabbitmq
        redis
        runtime
        safe
        scripts
        secretsmanager
        security
        server
        streaming
        systemplane
        tenant-manager
        tests
        transaction
        webhook
        zap
    secrets: inherit
