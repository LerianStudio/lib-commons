name: Tag Validation

# Workflow-level guard against the failure mode that produced v5.1.0:
# a stable (non-prerelease) tag was created on a commit that was not
# reachable from `main`. Branch-level prerelease config in
# `.releaserc.yml` already exists, but it is a soft contract — anything
# that pushes a tag outside semantic-release bypasses it. This workflow
# catches that case at the tag-push event and fails loudly so the tag
# is recognised as invalid before it propagates downstream.
#
# Rules:
#   - If the tagged commit IS reachable from `main` → tag may be stable
#     (no `-` suffix) or a prerelease. Pass.
#   - If the tagged commit is NOT reachable from `main` → the tag MUST
#     include a prerelease marker (e.g. `-beta.N`, `-rc.N`). Otherwise
#     fail.
#
# This workflow does not delete tags. Cleanup of an invalid tag remains
# a manual operation so a human reviews the situation before discarding
# a published reference.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  validate:
    name: Validate tag lineage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag against main reachability
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Explicitly dereference the tag ref to its commit object.
          # For annotated tags, github.sha already resolves to the
          # tagged commit, but `^{commit}` is the canonical form and
          # eliminates ambiguity if the event semantics change.
          TAG_COMMIT="$(git rev-parse "${TAG_NAME}^{commit}")"
          printf 'Tag: %s\nCommit: %s\n' "$TAG_NAME" "$TAG_COMMIT"

          # Resolve main locally so `git merge-base --is-ancestor` works
          # regardless of which branch (if any) the runner checked out.
          git fetch origin main:refs/heads/main --quiet

          if git merge-base --is-ancestor "$TAG_COMMIT" refs/heads/main; then
            printf '::notice::Tag %s points to a commit reachable from main; any version format is allowed.\n' "$TAG_NAME"
            exit 0
          fi

          printf '::notice::Tag %s points to a commit NOT reachable from main.\n' "$TAG_NAME"

          # Off-main tags must be prereleases. Conventional marker is the
          # `-` in semver build metadata (e.g. v5.2.0-beta.11).
          if [[ "$TAG_NAME" == *-* ]]; then
            printf '::notice::Tag %s carries a prerelease marker; off-main lineage is acceptable.\n' "$TAG_NAME"
            exit 0
          fi

          cat >&2 <<EOF
          ::error title=Invalid stable tag::Tag $TAG_NAME points to a commit that is not reachable from main and does not carry a prerelease marker (no '-' in the version). Stable releases must originate from main. This is the failure mode that produced v5.1.0 (released from develop, unreachable from main) and caused the next main hotfix to land as v5.0.3 instead of v5.1.1.

          Cleanup steps (perform manually after review):
            1. git tag -d $TAG_NAME
            2. git push origin :refs/tags/$TAG_NAME
            3. gh release delete $TAG_NAME --yes (if a GitHub Release was created)
            4. Investigate how the tag was created (manual push, misconfigured semantic-release run, etc.)
          EOF
          exit 1
