name: Go Combined Analysis

on:
  pull_request:
    branches: [develop, main]
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

jobs:
  go-analysis:
    name: Go Analysis
    uses: LerianStudio/github-actions-shared-workflows/.github/workflows/go-pr-analysis.yml@v1.33.0
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      security-events: write
    with:
      go_version: "1.26.3"
      golangci_lint_version: "v2.12.2"
      fail_on_coverage_threshold: true
      go_private_modules: "github.com/LerianStudio/*"
    secrets: inherit

  # TODO: move to shared workflow once it supports build-tagged perf gates.
  # AC15 perf gate is build-tagged `unit && !race` because the race detector
  # adds 10-50x latency overhead, making sub-microsecond thresholds
  # meaningless. Run the gate explicitly without -race so a regression in
  # GetForTenant fails CI rather than going silently unnoticed.
  perf-gate:
    name: AC15 Perf Gate (systemplane)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.26.3"
          cache: true

      # Branches that remove systemplane keep the required check context green
      # by skipping this legacy package-specific gate.
      - name: Run AC15 perf gate (no -race)
        run: |
          if [ ! -d "commons/systemplane" ]; then
            printf '%s\n' "commons/systemplane is not present; skipping AC15 perf gate."
            exit 0
          fi

          go test -tags=unit -run=^TestPerf_ ./commons/systemplane/...
