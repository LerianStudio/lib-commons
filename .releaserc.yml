# ───────────────────────────────────────────────────────────────────────────
# Go module majors live in the import path (…/v6, …/v7) and MUST be cut by hand:
# rename the module path, then tag vN.0.0. CI must NEVER auto-major a Go module.
#
# `develop` is a prerelease (beta) channel whose base is the last `main` release
# (currently v6.0.0). The /v6 cut's breaking commits (Fiber v3, `feat(core)!: …`)
# live in v6.0.0..HEAD, so a `breaking: major` rule re-applies them on every run
# and cuts a phantom v7.x-beta tag — INCONSUMABLE by Go for a /v6 module.
# Keep `breaking` at `minor`: #547 flipped it to `major` only to force the
# one-shot v5→v6 cut, which is done. For the next real major, do the path rename
# + manual vN.0.0 tag — do NOT re-flip this rule.
# ───────────────────────────────────────────────────────────────────────────
plugins:
  - ["@semantic-release/commit-analyzer", {
      preset: "conventionalcommits",
      parserOpts: {
        noteKeywords: [
          "BREAKING CHANGE",
          "BREAKING CHANGES"
        ]
      },
      releaseRules: [
        { type: "feat", release: "minor" },
        { type: "perf", release: "minor" },
        { type: "build", release: "minor" },
        { type: "chore", release: "patch" },
        { type: "ci", release: "patch" },
        { type: "test", release: "patch" },
        { type: "fix", release: "patch" },
        { type: "refactor", release: "minor" },
        { type: "docs", release: "patch" },
        { breaking: true, release: "minor" }
      ]
    }]

  # Plugin to version the CHANGELOG.md
  - ["@semantic-release/git", {
      assets: ["CHANGELOG.md"],
      message: "chore(release): ${nextRelease.version}\n\nupdated changelog."
    }]

  # Plugin to publish the CHANGELOG.md as an asset in the GitHub release
  - ["@semantic-release/github", {
      assets: [
        { path: "CHANGELOG.md", label: "Changelog" }
      ],
      successComment: false,
      failCommentCondition: false,
      labels: []
    }]
  - "@semantic-release/exec"

branches:
  - name: main
  - name: develop
    prerelease: beta
